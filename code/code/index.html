<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>课前学习报告</title>

    <link rel="stylesheet" href="css/style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud/dist/echarts-wordcloud.min.js"></script>
  </head>
  <body>
    <div class="page">
      <!-- 顶部 -->

      <div class="header">
        <div class="header-left">
          章节：<span id="chapterText">-章-</span>
          课前学习报告
        </div>

        <div class="header-right">
          <button id="openFormBtn" class="avatar-btn">
            <i class="fa-solid fa-user"></i>
          </button>

          <span> 学号：<span id="studentIdText">-</span> </span>
        </div>
      </div>

      <!-- 主体 -->

      <div class="main-container">
        <!-- 左侧 -->

        <div class="panel left-panel">
          <div class="module-title">模块一：知识闯关（个人）</div>

          <div class="basic-info">
            <div>
              起始层级：
              <span id="startLevelText">-</span>
            </div>

            <div>
              最终层级：
              <span id="endLevelText">-</span>
            </div>

            <div>
              练习题数：
              <span id="questionCountText">-</span>
            </div>

            <div>
              最终得分：
              <span id="finalScoreText">-</span>
            </div>
          </div>

          <div class="ai-diagnosis">
            AI错题诊断：

            <span id="diagnosisText">-</span>
          </div>

          <div class="ability-section">
            <div id="radarChart" class="radar-chart"></div>

            <div class="ability-values">
              <div>
                概念辨析：
                <span id="conceptText">-</span>
              </div>

              <div>
                模型构建：
                <span id="modelText">-</span>
              </div>

              <div>
                计算执行：
                <span id="calculateText">-</span>
              </div>

              <div>
                推理证明：
                <span id="reasonText">-</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 右侧 -->

        <div class="panel right-panel">
          <div class="module-title">模块二：案例分析（小组协作）</div>

          <div class="case-row">
            <div>
              小组案例：
              <span id="caseText">-</span>
            </div>

            <div class="case-buttons">
              <button class="small-btn">
                <i class="fa-solid fa-file"></i>
                文件
              </button>

              <button class="small-btn">
                <i class="fa-solid fa-video"></i>
                视频
              </button>

              <button class="small-btn">
                <i class="fa-solid fa-code"></i>
                代码
              </button>
            </div>
          </div>

          <div class="case-role-row">
            <div>
              小组编号：
              <span id="groupNumberText">-</span>
            </div>
            <div>
              你的分工：
              <span id="taskText">-</span>
            </div>
          </div>

          <!-- 第一行 -->

          <div class="box-row row1">
            <div class="row-title">
              AI智能评价： (<span id="aiScoreText">-</span>/30)
            </div>

            <div class="ai-content">
              <!-- 左 -->

              <div class="ai-box ai-table-box">
                <table>
                  <thead>
                    <tr>
                      <th>评分维度</th>
                      <th>等级</th>
                    </tr>
                  </thead>

                  <tbody>
                    <tr>
                      <td>概念正确性</td>
                      <td id="star1"></td>
                    </tr>

                    <tr>
                      <td>代码正确性</td>
                      <td id="star2"></td>
                    </tr>

                    <tr>
                      <td>案例完整性</td>
                      <td id="star3"></td>
                    </tr>

                    <tr>
                      <td>创新与实用价值</td>
                      <td id="star4"></td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <!-- 中 -->

              <div class="ai-box">
                <div id="wordCloudChart" class="word-cloud"></div>
              </div>

              <!-- 右 -->

              <div class="ai-box">
                <div id="commentText">-</div>
              </div>
            </div>
          </div>

          <!-- 第二行 -->

          <div class="row2">
            <div class="chart-box">
              <div class="chart-title">
                组内互评： (<span id="groupScoreText">-</span>/20)
              </div>

              <div id="groupChart" class="bar-chart"></div>
            </div>

            <div class="chart-box">
              <div class="chart-title">
                组间互评： (<span id="componentScoreText">-</span>/20)
              </div>

              <div id="componentChart" class="bar-chart"></div>
            </div>
          </div>

          <!-- 第三行 -->

          <div class="row3">
            <div class="teacher-chart-box">
              <div class="chart-title">
                教师评价： (<span id="teacherScoreText">-</span>/30)
              </div>

              <div id="teacherChart" class="teacher-chart"></div>
            </div>

            <div class="teacher-comment-box">
              <div class="chart-title">评语与建议</div>

              <div id="teacherCommentText">-</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 信息录入卡片 -->

    <div class="form-modal" id="formModal">
      <div class="form-card">
        <div class="form-head">
          <div class="form-title">信息填写</div>
          <div class="form-head-actions">
            <button type="button" class="reset-btn" id="resetFormBtn">
              重置
            </button>
            <button type="button" class="modal-close-btn" id="closeFormBtn">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        </div>

        <form id="reportForm">
          <!-- 这里后面JS自动生成内容 -->

          <div id="formFields"></div>

          <div class="form-actions">
            <button type="submit" class="submit-btn">生成报告</button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/charts.js"></script>
    <script src="js/form.js"></script>
  </body>
</html>
